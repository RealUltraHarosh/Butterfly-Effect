<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Симулятор Альтернативной Истории</title>
    <style>
        /* Базовые встроенные стили */
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #e94560;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #161625;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        label {
            font-weight: bold;
            color: #0f3460;
        }
        input, textarea {
            padding: 10px;
            background: #1a1a2e;
            color: #fff;
            border: 1px solid #0f3460;
            border-radius: 4px;
            font-size: 16px;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #e94560;
        }
        button {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #ff5270;
        }
        .nav-links {
            margin-top: 20px;
            text-align: center;
        }
        .nav-links a {
            color: #00fff0;
            text-decoration: none;
            margin: 0 10px;
        }
        .nav-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>Эффект Бабочки: Симулятор</h1>
    
    <!-- Форма ввода с базовой валидацией -->
    <form id="simulationForm">
        <label for="era">Временной период (Эпоха):</label>
        <input type="text" id="era" name="era" required placeholder="Например: Древний Рим, 1945 год...">

        <label for="original_event">Оригинальное событие:</label>
        <textarea id="original_event" name="original_event" required placeholder="Что произошло на самом деле..."></textarea>

        <label for="modified_event">Что вы изменили в этом событии (минимум 10 символов):</label>
        <textarea id="modified_event" name="modified_event" required minlength="10" placeholder="Опишите ваше вмешательство..."></textarea>

        <button type="submit">Запустить генерацию альтернативного будущего</button>
    </form>

    <div class="nav-links">
        <a href="/gallery">Перейти в Галерею</a>
    </div>

    <!-- Встроенный скрипт для обработки и отправки данных -->
    <script>
        document.getElementById('simulationForm').addEventListener('submit', async function(event) {
            event.preventDefault(); // Предотвращаем стандартную перезагрузку страницы

            // Собираем данные из полей ввода
            const era = document.getElementById('era').value;
            const originalEvent = document.getElementById('original_event').value;
            const modifiedEvent = document.getElementById('modified_event').value;

            const requestData = {
                era: era,
                original_event: originalEvent,
                modified_event: modifiedEvent
            };

            try {
                // Отправляем POST-запрос на бэкенд FastAPI
                const response = await fetch('/api/simulate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                if (response.ok) {
                    const result = await response.json();
                    alert("Успех: " + result.message);
                } else {
                    alert("Ошибка сервера при обработке запроса.");
                }
            } catch (error) {
                console.error("Ошибка сети:", error);
                alert("Не удалось связаться с сервером.");
            }
        });
    </script>
</body>
</html>
