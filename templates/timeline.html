<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Альтернативная Хронология</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #e94560;
        }
        .container {
            background: #161625;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        /* Блок сравнения событий "До" и "После" */
        .comparison {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 15px;
            align-items: center;
            margin-bottom: 30px;
            background: #1a1a2e;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #e94560;
        }
        .event-card {
            padding: 10px;
        }
        .event-title {
            font-size: 14px;
            color: #e94560;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .arrow {
            font-size: 24px;
            color: #00fff0;
            text-align: center;
        }
        .story-section {
            margin-top: 20px;
        }
        .story-text {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
            white-space: pre-line; /* Сохраняет абзацы текста */
        }
        .story-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 6px;
            border: 2px solid #0f3460;
        }
        .nav-links {
            margin-top: 30px;
            text-align: center;
        }
        .nav-links a {
            color: #00fff0;
            text-decoration: none;
            margin: 0 15px;
        }
        .nav-links a:hover {
            text-decoration: underline;
        }
        #loading {
            text-align: center;
            font-size: 20px;
            color: #00fff0;
            padding: 50px 0;
        }
    </style>
</head>
<body>

    <h1>Альтернативный Таймлайн</h1>

    <!-- Блок загрузки (будет виден, пока идет запрос) -->
    <div id="loading">Считывание темпоральных данных...</div>

    <!-- Основной контент (скрыт по умолчанию) -->
    <div id="content" class="container" style="display: none;">
        <div class="comparison">
            <div class="event-card">
                <div class="event-title">Реальная история</div>
                <p id="originalEventText"></p>
            </div>
            <div class="arrow">➜</div>
            <div class="event-card">
                <div class="event-title">Ваше вмешательство</div>
                <p id="modifiedEventText"></p>
            </div>
        </div>

        <div class="story-section">
            <div class="event-title">Что произошло в итоге (Эпоха: <span id="eraName"></span>)</div>
            <p id="storyText" class="story-text"></p>
            <img id="storyImg" class="story-image" src="" alt="Визуализация таймлайна">
        </div>
    </div>

    <div class="nav-links">
        <a href="/">Изменить другое событие</a> | 
        <a href="/gallery">Перейти в Галерею</a>
    </div>

    <script>
        // Извлекаем параметры из адреса страницы (например, ?id=...)
        const urlParams = new URLSearchParams(window.location.search);
        const scenarioId = urlParams.get('id');

        if (!scenarioId) {
            document.getElementById('loading').innerText = "Ошибка: ID сценария не указан в ссылке.";
        } else {
            loadScenarioData(scenarioId);
        }

        async function loadScenarioData(id) {
            try {
                // Запрашиваем сценарий по ID у нашего FastAPI-приложения
                const response = await fetch(`/api/scenario/${id}`);
                
                if (response.ok) {
                    const scenario = await response.json();
                    
                    // Заполняем страницу данными из базы данных
                    document.getElementById('eraName').innerText = scenario.era;
                    document.getElementById('originalEventText').innerText = scenario.original_event;
                    document.getElementById('modifiedEventText').innerText = scenario.modified_event;
                    document.getElementById('storyText').innerText = scenario.generated_text;
                    document.getElementById('storyImg').src = scenario.image_url;

                    // Скрываем надпись загрузки и показываем оформленный контент
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                } else {
                    document.getElementById('loading').innerText = "Сценарий с таким ID не найден в хрониках.";
                }
            } catch (error) {
                console.error("Ошибка при получении данных:", error);
                document.getElementById('loading').innerText = "Ошибка при загрузке темпоральных данных.";
            }
        }
    </script>
</body>
</html>
