<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Симулятор Альтернативной Истории</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #121212;
            color: #f5f5f7;
            max-width: 600px;
            margin: 60px auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 {
            font-family: "Georgia", serif;
            text-align: center;
            color: #fff;
            font-size: 32px;
            font-weight: normal;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #1c1c1e;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #2c2c2e;
        }
        label {
            font-family: "Georgia", serif;
            font-size: 16px;
            color: #d1a153; /* Мягкое архивное золото */
            margin-bottom: -5px;
        }
        input, textarea {
            padding: 12px;
            background: #121212;
            color: #fff;
            border: 1px solid #2c2c2e;
            border-radius: 6px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #d1a153;
        }
        button {
            background-color: #d1a153;
            color: #121212;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #e5b25d;
        }
        .nav-links {
            margin-top: 30px;
            text-align: center;
        }
        .nav-links a {
            color: #a1a1a6;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>Эффект Бабочки: Симулятор</h1>
    
    <!-- Упрощенная форма ввода -->
    <form id="simulationForm">
        <label for="history_query">Историческое событие или личность:</label>
        <input type="text" id="history_query" name="history_query" required 
       placeholder="Будьте точны. Например: Танк Пантера, Римский император Цезарь, Юрий Гагарин...">

        <label for="modified_event">Что произошло по-другому? (Минимум 10 символов):</label>
        <textarea id="modified_event" name="modified_event" required minlength="10" placeholder="Опишите ваше вмешательство в историю..."></textarea>

        <button type="submit">Запустить генерацию альтернативного будущего</button>
    </form>

    <div class="nav-links">
        <a href="/gallery">Перейти в Галерею</a>
    </div>

    <script>
        document.getElementById('simulationForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            // Собираем данные из полей ввода
            const historyQuery = document.getElementById('history_query').value;
            const modifiedEvent = document.getElementById('modified_event').value;

            const requestData = {
                history_query: historyQuery,
                modified_event: modifiedEvent
            };

            try {
                const response = await fetch('/api/simulate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                if (response.ok) {
                    const result = await response.json();
                    // Перенаправляем пользователя на страницу таймлайна
                    window.location.href = `/timeline?id=${result.scenario_id}`;
                } else {
                    alert("Ошибка сервера при обработке запроса.");
                }
            } catch (error) {
                console.error("Ошибка сети:", error);
                alert("Не удалось связаться с сервером.");
            }
        });
    </script>
</body>
</html>
