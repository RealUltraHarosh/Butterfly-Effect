<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Архив Альтернативных Миров</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #121212;
            color: #f5f5f7;
            max-width: 1000px;
            margin: 60px auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 {
            font-family: "Georgia", serif;
            text-align: center;
            color: #fff;
            font-size: 36px;
            font-weight: normal;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }
        .nav-links {
            text-align: center;
            margin-bottom: 40px;
        }
        .nav-links a {
            color: #a1a1a6;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: #fff;
            text-decoration: underline;
        }
        /* Сетка карточек */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 30px;
        }
        /* Карточка */
        .card {
            background: #1c1c1e;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #2c2c2e;
            transition: transform 0.2s, border-color 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: #d1a153;
        }
        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 1px solid #2c2c2e;
        }
        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .card-title {
            font-family: "Georgia", serif;
            font-size: 18px;
            color: #d1a153;
            margin-bottom: 10px;
            font-weight: normal;
        }
        .card-change {
            font-size: 14px;
            color: #a1a1a6;
            margin-bottom: 25px;
            flex-grow: 1;
            line-height: 1.5;
        }
        .card-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-view {
            background-color: #d1a153;
            color: #121212;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            transition: background 0.2s;
        }
        .btn-view:hover {
            background-color: #e5b25d;
        }
        .btn-delete {
            background-color: transparent;
            color: #ff453a; /* Спокойный системный красный */
            border: 1px solid #2c2c2e;
            padding: 7px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: border-color 0.2s, background-color 0.2s;
            font-family: inherit;
        }
        .btn-delete:hover {
            border-color: #ff453a;
            background-color: rgba(255, 69, 58, 0.05);
        }
        #no-scenarios {
            font-family: "Georgia", serif;
            text-align: center;
            font-size: 18px;
            color: #636366;
            grid-column: 1 / -1;
            padding: 60px 0;
        }
    </style>
</head>
<body>

    <h1>Архив Созданных Миров</h1>

    <div class="nav-links">
        <a href="/">← Вернуться и изменить историю</a>
    </div>

    <!-- Контейнер для карточек -->
    <div id="gallery-grid" class="grid">
        <!-- Сюда JavaScript будет динамически вставлять карточки -->
        <div id="no-scenarios">Вы пока не изменили ни одной временной линии...</div>
    </div>

    <script>
        // Загружаем все сценарии при загрузке страницы
        document.addEventListener('DOMContentLoaded', loadGallery);

        async function loadGallery() {
            const grid = document.getElementById('gallery-grid');
            const placeholder = document.getElementById('no-scenarios');

            try {
                const response = await fetch('/api/scenarios');
                if (response.ok) {
                    const scenarios = await response.json();

                    if (scenarios.length > 0) {
                        // Очищаем сетку (убираем плейсхолдер)
                        grid.innerHTML = '';

                        scenarios.forEach(scenario => {
                            // Создаем карточку сценария
                            const card = document.createElement('div');
                            card.className = 'card';
                            card.id = `card-${scenario.id}`;

                            card.innerHTML = `
                                <img class="card-img" src="${scenario.image_url}" alt="${scenario.era}">
                                <div class="card-content">
                                    <div class="card-title">${scenario.era}</div>
                                    <div class="card-change">
                                        <strong>Изменение:</strong> ${scenario.modified_event}
                                    </div>
                                    <div class="card-actions">
                                        <a href="/timeline?id=${scenario.id}" class="btn-view">Открыть таймлайн</a>
                                        <button class="btn-delete" onclick="deleteScenario('${scenario.id}')">Удалить</button>
                                    </div>
                                </div>
                            `;
                            grid.appendChild(card);
                        });
                    }
                }
            } catch (error) {
                console.error("Ошибка при загрузке галереи:", error);
            }
        }

        // Функция удаления сценария
        async function deleteScenario(id) {
            if (confirm("Вы уверены, что хотите навсегда стереть эту временную линию из архива?")) {
                try {
                    const response = await fetch(`/api/scenario/${id}`, {
                        method: 'DELETE'
                    });

                    if (response.ok) {
                        // Удаляем карточку из интерфейса без перезагрузки страницы
                        const card = document.getElementById(`card-${id}`);
                        if (card) {
                            card.remove();
                        }
                        
                        // Если карточек больше не осталось, возвращаем плейсхолдер
                        const grid = document.getElementById('gallery-grid');
                        if (grid.children.length === 0) {
                            grid.innerHTML = '<div id="no-scenarios">Вы пока не изменили ни одной временной линии...</div>';
                        }
                    } else {
                        alert("Не удалось удалить сценарий с сервера.");
                    }
                } catch (error) {
                    console.error("Ошибка при удалении:", error);
                    alert("Ошибка сети при попытке удаления.");
                }
            }
        }
    </script>
</body>
</html>
